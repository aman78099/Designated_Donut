<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut Destination</title>
    <link rel="stylesheet" href="/static/style.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>
    <div class="top-navigation-container-bar">
        <div class="left-side-container-box-for-logo">
            <img src="/static/images/Donut_Icon_Logo.png" alt="Donut Destination Icon" height="400px" width="400px">
            <span class="logo-title-text">Donut Destination</span>

        </div>
        <div class="right-side-nav-options">

            <div class="login-page-action-btn">
                <i class="ri-user-line"></i>
                <a class="btn-content-text" href="{{ url_for('login_page') }}">Login</a>
            </div>


            <div class="home-page-action-btn">
                <i class="ri-home-3-line"></i>
                <a class="btn-content-text" href="{{ url_for('home_page') }}">Home</a>
            </div>

            <div class="about-page-action-btn">
                <i class="ri-info-i"></i>
                <a class="btn-content-text" href="{{ url_for('about_page') }}">About</a>
            </div>

            <div class="orders-page-action-btn">
                <i class="ri-inbox-archive-line"></i>
                <a class="btn-content-text" href="{{ url_for('order_page') }}">Orders</a>
            </div>

            <div class="reviews-page-action-btn">
                <i class="ri-question-answer-line"></i>
                <a class="btn-content-text" href="{{ url_for('review_page') }}">Reviews</a>
            </div>


            <i class="ri-shopping-cart-line"></i>

        </div>
    </div>

    <section>
        <div class="main-container">
            <h1 class="subtitle-txt">
                <a>Designated Donuts</a>
            </h1>
            <p class="description-txt">
                <a>Hello donut lovers</a>
            </p>
        </div>
    </section>
</body>
</html>
